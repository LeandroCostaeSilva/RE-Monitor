kind = "web"
previewPath = "/"
title = "ANVISA-RE Monitor"
version = "1.0.0"
id = "artifacts/anvisa-re-monitor"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20622

[services.development]
run = "pnpm --filter @workspace/anvisa-re-monitor run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/anvisa-re-monitor", "run", "build" ]
publicDir = "artifacts/anvisa-re-monitor/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20622"
BASE_PATH = "/"
